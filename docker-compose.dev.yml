services:
  db:
    image: postgres:16-alpine
    container_name: foodclick-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: foodclick
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: UTC
    ports:
      - "55432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./backend/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d foodclick"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: foodclick-backend-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@db:5432/foodclick
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: foodclick-frontend-dev
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_PROXY_TARGET: http://backend:4000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_dev_data:
  backend_node_modules:
  frontend_node_modules:
